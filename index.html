<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucas Hunhoff | Bário de Ouro</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text-gray: #b0b0b0;
            --accent: #1f1f1f;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: #efefef;
            line-height: 1.9;
            scroll-behavior: smooth;
        }

        /* --- ASSINATURA LUCAS HUNHOFF --- */
        .brand-name {
            position: absolute;
            top: 40px;
            left: 50px;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            z-index: 10;
            line-height: 1;
            border-left: 6px solid var(--gold);
            padding-left: 20px;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
        }

        .history-seal {
            position: absolute;
            top: 40px;
            right: 50px;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 10;
            text-align: right;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 5px;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
        }

        header {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSgLEqbxtU1sWV_qbODpvJz-4jDGyVcCCyixw&s');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 10px solid var(--gold);
            position: relative;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 12vw, 7.5rem);
            margin: 0;
            color: var(--gold);
            letter-spacing: 20px;
            text-transform: uppercase;
            line-height: 0.9;
        }

        header p {
            color: white;
            font-size: 1.6rem;
            letter-spacing: 8px;
            margin-top: 30px;
            font-weight: 300;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--gold);
            font-size: clamp(3rem, 10vw, 5rem);
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-gray);
            margin-bottom: 80px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
        }

        .about-text {
            font-size: 1.3rem;
            column-count: 2;
            column-gap: 80px;
            text-align: justify;
            margin-bottom: 150px;
            color: var(--text-gray);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap
